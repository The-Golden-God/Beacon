<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 90" width="80" height="90" role="img" aria-label="Beacon icon">
  <title>Beacon</title>

  <!-- ── LIGHTHOUSE MARK — centered at x=40 ── -->

  <!-- Base platform -->
  <rect x="16" y="79" width="48" height="8" rx="3" fill="#1B2B5E"/>

  <!-- Tower body -->
  <rect x="32" y="37" width="16" height="42" fill="#1B2B5E"/>

  <!-- Lantern room -->
  <rect x="22" y="23" width="36" height="14" rx="2" fill="#1B2B5E"/>

  <!-- Light halo -->
  <circle cx="40" cy="23" r="10" fill="#F59E0B" fill-opacity="0.18"/>

  <!-- Signal arcs — center (40, 23) -->
  <!-- Arc 1: r=11 -->
  <path d="M 31.57 15.93 A 11 11 0 0 1 48.43 15.93"
        fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arc 2: r=16 -->
  <path d="M 27.74 12.72 A 16 16 0 0 1 52.26 12.72"
        fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <!-- Arc 3: r=21 -->
  <path d="M 23.91 9.50 A 21 21 0 0 1 56.09 9.50"
        fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Light core -->
  <circle cx="40" cy="23" r="5.5" fill="#F59E0B"/>
</svg>
